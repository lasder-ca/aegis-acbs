name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-current:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/aegis

  compatibility-go123:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
          cache: true
      - run: go test ./...
      - run: go build ./cmd/aegis

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test -race ./internal/search ./internal/graph ./internal/bench ./internal/server

  quality-and-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: Formatting
        shell: bash
        run: test -z "$(gofmt -l cmd internal)"
      - name: Cross-build
        shell: bash
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o "$RUNNER_TEMP/aegis-linux-amd64" ./cmd/aegis
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o "$RUNNER_TEMP/aegis-linux-arm64" ./cmd/aegis
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o "$RUNNER_TEMP/aegis-windows-amd64.exe" ./cmd/aegis
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o "$RUNNER_TEMP/aegis-darwin-amd64" ./cmd/aegis
      - name: Shell syntax
        shell: bash
        run: bash -n scripts/*.sh
      - name: Python syntax
        run: python3 -m py_compile scripts/*.py
