<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>ACBS Tail Replay</title><style>:root{color-scheme:dark;background:#0a1018;color:#e8edf5;font:14px system-ui,sans-serif}body{margin:0}main{max-width:1320px;margin:auto;padding:30px}.eyebrow{color:#8394aa;text-transform:uppercase;letter-spacing:.15em;font-size:12px}h1{font-size:34px;margin:8px 0}.sub{color:#a8b5c7;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card{background:#111a27;border:1px solid #26344a;border-radius:12px;padding:15px}.label{color:#91a0b5;font-size:12px}.value{font-size:25px;font-weight:700;margin-top:5px}.ok{color:#76ddb2}.warn{color:#ffd27a}.bad{color:#ff8d9b}.table{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid #27344a;white-space:nowrap}th{color:#b3bfd1}.case{margin-top:14px}.case summary{cursor:pointer;font-size:16px;font-weight:700}.trace{max-height:360px;overflow:auto}.pill{display:inline-block;border:1px solid #35445c;border-radius:999px;padding:2px 8px;font-size:12px}.footer{color:#8390a3;margin-top:18px}</style></head><body><main><div class="eyebrow">Aegis ACBS · isolated outlier replay</div><h1>Tail Replay Report</h1><div class="sub" id="subtitle"></div><section class="grid" id="kpis"></section><section class="card" style="margin-top:14px"><h2>Cases</h2><div class="table"><table><thead><tr><th>Run</th><th>Query</th><th>Class</th><th>Original</th><th>Replay baseline</th><th>ACBS</th><th>Penalty</th><th>Static</th><th>Classification</th></tr></thead><tbody id="cases"></tbody></table></div></section><section id="details"></section><div class="footer" id="footer"></div></main><script>const R=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob('__AEGIS_REGRET_REPLAY_BASE64__'),c=>c.charCodeAt(0))));const ms=n=>(n/1e6).toFixed(3)+' ms';const cls=x=>x==='not-reproduced'?'ok':x==='adaptive-scheduler-tail'?'bad':'warn';document.getElementById('subtitle').textContent=`${R.graphName} · ${R.metric} · ${R.config.runs} timed replays + ${R.config.warmup} warmups · ${R.generatedAt}`;const cards=[['Cases',R.replayedCases],['Reproduced',R.reproducedMeaningful],['Scheduler tails',R.adaptiveSchedulerTail],['Persistent classical',R.persistentClassical],['Not reproduced',R.notReproduced],['Correct',R.allCorrect?'YES':'NO']];document.getElementById('kpis').innerHTML=cards.map((x,i)=>`<div class="card"><div class="label">${x[0]}</div><div class="value ${i===5?(R.allCorrect?'ok':'bad'):''}">${x[1]}</div></div>`).join('');document.getElementById('cases').innerHTML=R.cases.map((x,i)=>`<tr><td>${x.sourceReport}</td><td>${x.queryIndex}</td><td>${x.class}</td><td>${x.originalRatio.toFixed(3)}× / ${ms(x.originalPenaltyNs)}</td><td>${x.fastestClassical} ${ms(x.fastestClassicalNs)}</td><td>${ms(x.aegisNs)} (${x.aegisRatio.toFixed(3)}×)</td><td>${ms(x.aegisPenaltyNs)}</td><td>${ms(x.staticNs)}</td><td><span class="pill ${cls(x.classification)}">${x.classification}</span></td></tr>`).join('');document.getElementById('details').innerHTML=R.cases.map((x,i)=>`<details class="card case"><summary>Query ${x.queryIndex} · ${x.classification} · ${(x.straightLineMeters/1000).toFixed(2)} km</summary><p>Source ${x.sourceId} → Target ${x.targetId}. First upper bound at chunk ${x.traceUpperBoundChunk||'—'}.</p><div class="table"><table><thead><tr><th>Algorithm</th><th>Mean</th><th>Median</th><th>p95</th><th>Worst</th><th>Expanded</th><th>Relaxed</th></tr></thead><tbody>${x.algorithms.map(a=>`<tr><td>${a.algorithm}</td><td>${ms(a.meanNs)}</td><td>${ms(a.medianNs)}</td><td>${ms(a.p95Ns)}</td><td>${ms(a.maxNs)}</td><td>${a.medianExpanded}</td><td>${a.medianRelaxed}</td></tr>`).join('')}</tbody></table></div><h3>ACBS scheduler trace</h3><div class="trace"><table><thead><tr><th>Chunk</th><th>Dir</th><th>Budget</th><th>LB gain</th><th>Work</th><th>Expanded</th><th>Relaxed</th><th>Q F/B</th><th>Score F/B</th><th>Upper bound</th></tr></thead><tbody>${x.trace.map(t=>`<tr><td>${t.chunk}</td><td>${t.direction}</td><td>${t.budget}</td><td>${t.lowerBoundGain}</td><td>${t.work}</td><td>${t.expandedDelta}</td><td>${t.relaxedDelta}</td><td>${t.forwardQueueAfter}/${t.backwardQueueAfter}</td><td>${t.forwardScoreAfter.toFixed(3)}/${t.backwardScoreAfter.toFixed(3)}</td><td>${t.hadUpperBoundAfter?t.upperBoundAfter:'—'}</td></tr>`).join('')}</tbody></table></div></details>`).join('');document.getElementById('footer').textContent=`${R.version} · Aegis ${R.aegisVersion} · validation source ${R.validationPath}`;</script></body></html>
