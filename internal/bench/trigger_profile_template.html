<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>ACBS Trigger Profile</title><style>:root{color-scheme:dark;background:#091018;color:#e8edf5;font:14px system-ui,sans-serif}body{margin:0}main{max-width:1400px;margin:auto;padding:30px}.eyebrow{color:#8190a5;text-transform:uppercase;letter-spacing:.14em;font-size:12px}h1{font-size:34px;margin:8px 0}.sub{color:#a5b2c4;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card{background:#111a27;border:1px solid #27364c;border-radius:12px;padding:15px}.label{font-size:12px;color:#91a0b5}.value{font-size:25px;font-weight:700;margin-top:5px}.ok{color:#76ddb2}.warn{color:#ffd27a}.bad{color:#ff8d9b}.table{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid #28364a;white-space:nowrap}th{color:#b4c0d1}.pill{display:inline-block;border:1px solid #3a4960;border-radius:999px;padding:2px 8px;font-size:12px}.footer{color:#8190a4;margin-top:18px}code{white-space:normal}</style></head><body><main><div class="eyebrow">Aegis ACBS · whole-suite scheduler checkpoints</div><h1>Trigger Profile</h1><div class="sub" id="subtitle"></div><section class="grid" id="kpis"></section><section class="card" style="margin-top:14px"><h2>Ranked trigger rules</h2><div class="table"><table><thead><tr><th>Status</th><th>Checkpoint</th><th>Rule</th><th>Matches</th><th>Positive</th><th>False positives</th><th>Precision</th><th>Recall</th></tr></thead><tbody id="rules"></tbody></table></div></section><section class="card" style="margin-top:14px"><h2>Replay-labelled tails</h2><div class="table"><table><thead><tr><th>Run</th><th>Seed</th><th>Query</th><th>Class</th><th>Label</th><th>Chunks</th><th>Upper chunk</th><th>Stable</th><th>Correct</th></tr></thead><tbody id="tails"></tbody></table></div></section><div class="footer" id="footer"></div></main><script>const R=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob('__AEGIS_TRIGGER_PROFILE_BASE64__'),c=>c.charCodeAt(0))));const fmt=x=>Number(x).toFixed(4);const ruleText=r=>`upper missing && `+r.conditions.map(c=>`${c.feature} ${c.operator} ${Number(c.threshold).toPrecision(5)}`).join(' && ');document.getElementById('subtitle').textContent=`${R.graphName} · ${R.metric} · ${R.queries} queries · ${R.generatedAt}`;const cards=[['Queries',R.queries],['Scheduler tails',R.schedulerTails],['Persistent tails',R.persistentTails],['Trace errors',R.traceErrors],['Unstable labels',R.unstableLabels],['Selected rule',R.selectedRule?'YES':'NO'],['Correct',R.allCorrect?'YES':'NO']];document.getElementById('kpis').innerHTML=cards.map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="value ${x[0]==='Correct'?(x[1]==='YES'?'ok':'bad'):x[0]==='Selected rule'?(x[1]==='YES'?'ok':'warn'):''}">${x[1]}</div></div>`).join('');document.getElementById('rules').innerHTML=(R.rules||[]).map(r=>`<tr><td><span class="pill ${r.eligible?'ok':'warn'}">${r.eligible?'ELIGIBLE':'candidate'}</span></td><td>${r.checkpoint}</td><td><code>${ruleText(r)}</code></td><td>${r.matches}</td><td>${r.positiveMatches}</td><td>${r.falsePositives}</td><td>${fmt(100*r.precision)}%</td><td>${fmt(100*r.recall)}%</td></tr>`).join('');const tails=R.rows.filter(x=>x.schedulerTail||x.persistentTail);document.getElementById('tails').innerHTML=tails.map(x=>`<tr><td>${x.sourceReport}</td><td>${x.seed}</td><td>${x.queryIndex}</td><td>${x.class}</td><td><span class="pill ${x.schedulerTail?'bad':'warn'}">${x.schedulerTail?'scheduler':'persistent'}</span></td><td>${x.chunks}</td><td>${x.upperBoundChunk||'—'}</td><td class="${x.stable?'ok':'bad'}">${x.stable}</td><td class="${x.correct?'ok':'bad'}">${x.correct}</td></tr>`).join('');document.getElementById('footer').textContent=`${R.version} · Aegis ${R.aegisVersion} · validation ${R.validationPath} · replay ${R.replayPath}`;</script></body></html>
