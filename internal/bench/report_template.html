<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aegis ACBS — Benchmark Report</title>
<style>
:root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;--bg:#070a10;--panel:#111824;--panel2:#0a1019;--line:#273349;--text:#eef4ff;--muted:#95a4ba;--blue:#8eb6ff;--green:#75ddb0;--amber:#ffc56e;--purple:#c6a2ff;--red:#ff8c9a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% -8%,#1a2d55 0,transparent 34%),radial-gradient(circle at 96% 5%,#17352f 0,transparent 30%),var(--bg);color:var(--text)}main{max-width:1360px;margin:auto;padding:32px 20px 64px}header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--purple)}h1{font-size:clamp(38px,7vw,76px);line-height:.92;letter-spacing:-.065em;margin:8px 0 14px}.subtitle{color:var(--muted);max-width:800px}.lang{background:#111927;color:var(--text);border:1px solid var(--line);padding:10px 12px;border-radius:12px}.grid{display:grid;gap:16px}.meta{grid-template-columns:repeat(6,minmax(0,1fr));margin:18px 0}.kpis{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:16px}.two{grid-template-columns:1fr 1fr}.card{background:linear-gradient(180deg,rgba(18,27,42,.96),rgba(9,15,24,.96));border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 24px 72px rgba(0,0,0,.22)}.meta .card{padding:14px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.085em;color:var(--muted)}.value{font-size:24px;font-weight:780;margin-top:5px;letter-spacing:-.035em}.meta .value{font-size:17px}.good{border-color:rgba(117,221,176,.48)}.warn{border-color:rgba(255,197,110,.48)}.bad{border-color:rgba(255,140,154,.48)}h2{font-size:18px;margin:0 0 4px}.hint{color:var(--muted);font-size:12px;margin:0 0 14px}.chart{display:block;width:100%;height:300px;border-radius:14px;background:linear-gradient(180deg,#090e16,#070b12);border:1px solid #1e293b}.chart.short{height:245px}.full{grid-column:1/-1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{border-collapse:collapse;width:100%;min-width:820px}th,td{text-align:right;padding:12px 14px;border-bottom:1px solid #1d2839;font-size:13px}th:first-child,td:first-child{text-align:left}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;background:#0b111a;position:sticky;top:0}.pill{display:inline-flex;align-items:center;gap:7px;padding:5px 9px;border-radius:999px;background:#182235;border:1px solid #2a3952}.dot{width:8px;height:8px;border-radius:50%}.footer{margin-top:18px;color:#728198;font-size:12px}@media(max-width:1080px){.meta{grid-template-columns:repeat(3,1fr)}.kpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){header{flex-direction:column}.two{grid-template-columns:1fr}.meta{grid-template-columns:repeat(2,1fr)}.kpis{grid-template-columns:1fr}.card{border-radius:16px}main{padding:24px 14px 48px}h1{font-size:44px}}
</style>
</head>
<body><main>
<header><div><div class="eyebrow">Aegis ACBS · experimental</div><h1 data-t="title"></h1><div class="subtitle" id="subtitle"></div></div><select id="lang" class="lang"><option value="ja">日本語</option><option value="en">English</option><option value="zh-CN">中文</option><option value="ko">한국어</option><option value="fr">Français</option></select></header>
<section id="meta" class="grid meta"></section>
<section id="kpis" class="grid kpis"></section>
<section class="grid two">
<div class="card"><h2 data-t="latency"></h2><p class="hint" data-t="latencyHint"></p><canvas id="latency" class="chart"></canvas></div>
<div class="card"><h2 data-t="work"></h2><p class="hint" data-t="workHint"></p><canvas id="work" class="chart"></canvas></div>
<div class="card"><h2 data-t="directions"></h2><p class="hint" data-t="directionsHint"></p><canvas id="directions" class="chart short"></canvas></div>
<div class="card"><h2 data-t="regret"></h2><p class="hint" data-t="regretHint"></p><canvas id="regret" class="chart short"></canvas></div>
<div class="card full"><h2 data-t="directionClasses"></h2><p class="hint" data-t="directionClassesHint"></p><canvas id="directionClasses" class="chart short"></canvas></div>
<div class="card full"><h2 data-t="classes"></h2><p class="hint" data-t="classesHint"></p><canvas id="classes" class="chart"></canvas></div>
<div class="card full"><h2 data-t="details"></h2><p class="hint" data-t="detailsHint"></p><div class="table-wrap"><table><thead><tr><th data-t="algorithm"></th><th>mean</th><th>p50</th><th>best</th><th>worst</th><th>p95</th><th>p99</th><th data-t="expanded"></th><th data-t="relaxed"></th><th>push</th><th>pop</th><th>stale</th><th>prune pop</th><th>prune relax</th><th>alloc</th><th data-t="speedup"></th><th data-t="correctness"></th></tr></thead><tbody id="rows"></tbody></table></div></div>
</section><div class="footer" id="footer"></div>
</main>
<script>
const REPORT=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob('__AEGIS_REPORT_BASE64__'),c=>c.charCodeAt(0))));
const COLORS={dijkstra:'#8eb6ff',bidijkstra:'#75ddb0',astar:'#ffc56e',aegis:'#c6a2ff','aegis-static':'#ff9fd2','aegis-no-prune':'#9de0ff',forward:'#8eb6ff',backward:'#ff8c9a'};
const I={
ja:{title:'ACBS ベンチマーク',generated:'生成日時',graph:'グラフ',nodes:'頂点',edges:'辺',queries:'クエリ',repeats:'反復',correctness:'正確性',speedup:'対Dijkstra速度',runtimeRegret:'p95 oracle regret',bound:'終了下界/解',switches:'方向切替',pruned:'上界枝刈り',latency:'レイテンシ比較',latencyHint:'クエリごとのp50とp95。低いほど高速です。',work:'探索量',workHint:'確認辺数の中央値。低いほど探索を絞れています。',directions:'前後探索の構成',directionsHint:'ACBSが実際に展開した前向き・後向きノードの割合です。',regret:'最速ベースラインに対する相対実行時間',regretHint:'ACBS時間 ÷ 各クエリで最速だった既存方式。1未満はACBSが全ベースラインより高速です。',directionClasses:'距離クラス別の探索方向',directionClassesHint:'local・random・regionalで前後の探索量がどう変わるかを示します。',classes:'距離クラス別レイテンシ',classesHint:'各距離クラスでの中央値です。',details:'詳細比較',detailsHint:'全結果をDijkstraの最短距離と経路連続性に対して検証しています。',algorithm:'アルゴリズム',expanded:'展開頂点',relaxed:'確認辺',allCorrect:'全件一致',source:'データ元'},
en:{title:'ACBS benchmark',generated:'Generated',graph:'Graph',nodes:'Nodes',edges:'Edges',queries:'Queries',repeats:'Repeats',correctness:'Correctness',speedup:'Speed vs Dijkstra',runtimeRegret:'p95 oracle regret',bound:'Termination bound / path',switches:'Direction switches',pruned:'Bound-pruned states',latency:'Latency comparison',latencyHint:'Per-query p50 and p95. Lower is faster.',work:'Search work',workHint:'Median relaxed edges. Lower means a narrower search.',directions:'Coupled direction balance',directionsHint:'Actual forward and backward node expansions performed by ACBS.',regret:'Relative runtime to fastest baseline',regretHint:'ACBS time divided by the fastest baseline per query. Values below 1 mean ACBS beat every baseline.',directionClasses:'Direction balance by distance class',directionClassesHint:'How the forward/backward workload changes for local, random, and regional queries.',classes:'Latency by distance class',classesHint:'Median latency for each distance class.',details:'Detailed comparison',detailsHint:'Every result is checked against Dijkstra distance and path continuity.',algorithm:'Algorithm',expanded:'Expanded',relaxed:'Relaxed',allCorrect:'All matched',source:'Source'},
'zh-CN':{title:'ACBS 基准测试',generated:'生成时间',graph:'图',nodes:'节点',edges:'边',queries:'查询',repeats:'重复次数',correctness:'正确性',speedup:'相对Dijkstra速度',runtimeRegret:'p95 oracle regret',bound:'终止下界/路径',switches:'方向切换',pruned:'上界剪枝',latency:'延迟比较',latencyHint:'每个查询的p50和p95，越低越快。',work:'搜索工作量',workHint:'检查边数中位数，越低表示搜索越集中。',directions:'双向搜索构成',directionsHint:'ACBS实际扩展的前向和后向节点比例。',regret:'相对最快基线',regretHint:'ACBS时间除以每个查询最快的基线；小于1表示ACBS快于所有基线。',directionClasses:'按距离类别的方向构成',directionClassesHint:'local、random、regional中的前后向工作量。',classes:'按距离类别的延迟',classesHint:'各距离类别的延迟中位数。',details:'详细比较',detailsHint:'所有结果均与Dijkstra距离和路径连续性核对。',algorithm:'算法',expanded:'扩展节点',relaxed:'检查边',allCorrect:'全部一致',source:'数据源'},
ko:{title:'ACBS 벤치마크',generated:'생성 시각',graph:'그래프',nodes:'노드',edges:'간선',queries:'쿼리',repeats:'반복',correctness:'정확성',speedup:'Dijkstra 대비 속도',runtimeRegret:'p95 oracle regret',bound:'종료 하한/경로',switches:'방향 전환',pruned:'상한 가지치기',latency:'지연 시간 비교',latencyHint:'쿼리별 p50과 p95입니다. 낮을수록 빠릅니다.',work:'탐색 작업량',workHint:'검사 간선 중앙값입니다. 낮을수록 탐색이 좁습니다.',directions:'양방향 탐색 구성',directionsHint:'ACBS가 실제로 확장한 정방향·역방향 노드 비율입니다.',regret:'최고속 기준 대비',regretHint:'ACBS 시간 ÷ 각 쿼리의 최고속 기준. 1 미만이면 ACBS가 모든 기준보다 빠릅니다.',directionClasses:'거리 유형별 방향 구성',directionClassesHint:'local, random, regional에서 양방향 작업량 변화를 표시합니다.',classes:'거리 유형별 지연 시간',classesHint:'거리 유형별 중앙 지연 시간입니다.',details:'상세 비교',detailsHint:'모든 결과를 Dijkstra 거리와 경로 연속성으로 검증합니다.',algorithm:'알고리즘',expanded:'확장 노드',relaxed:'검사 간선',allCorrect:'전부 일치',source:'데이터 원본'},
fr:{title:'Benchmark ACBS',generated:'Généré',graph:'Graphe',nodes:'Sommets',edges:'Arêtes',queries:'Requêtes',repeats:'Répétitions',correctness:'Exactitude',speedup:'Vitesse vs Dijkstra',runtimeRegret:'p95 oracle regret',bound:'Borne finale / chemin',switches:'Changements de direction',pruned:'États élagués',latency:'Comparaison de latence',latencyHint:'p50 et p95 par requête. Plus bas est meilleur.',work:'Travail de recherche',workHint:'Médiane des arêtes examinées. Plus bas signifie une recherche plus ciblée.',directions:'Équilibre bidirectionnel',directionsHint:'Répartition réelle des sommets explorés en avant et en arrière par ACBS.',regret:'Temps vs meilleure référence',regretHint:'Temps ACBS divisé par la référence la plus rapide. Une valeur inférieure à 1 signifie qu’ACBS gagne.',directionClasses:'Directions par classe de distance',directionClassesHint:'Répartition avant/arrière pour local, random et regional.',classes:'Latence par classe de distance',classesHint:'Latence médiane de chaque classe.',details:'Comparaison détaillée',detailsHint:'Chaque résultat est vérifié par la distance Dijkstra et la continuité du chemin.',algorithm:'Algorithme',expanded:'Sommets explorés',relaxed:'Arêtes examinées',allCorrect:'Tous identiques',source:'Source'}};
let lang='ja',T=I.ja;const $=s=>document.querySelector(s);const fmtInt=n=>Number(n||0).toLocaleString();const fmtMs=n=>n<1e6?(n/1e3).toFixed(2)+' µs':(n/1e6).toFixed(3)+' ms';const fmtBytes=n=>{n=Number(n||0);return n>=1073741824?(n/1073741824).toFixed(2)+' GiB':n>=1048576?(n/1048576).toFixed(2)+' MiB':n>=1024?(n/1024).toFixed(1)+' KiB':n+' B'};const pct=v=>(100*(v||0)).toFixed(1)+'%';
function resize(c){const d=devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*d;c.height=h*d;const x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);x.clearRect(0,0,w,h);return{x,w,h}}
function axes(x,w,h,max,label){x.strokeStyle='#273349';x.fillStyle='#93a3ba';x.font='11px system-ui';x.textAlign='right';for(let i=0;i<=4;i++){const y=18+(h-54)*i/4;x.beginPath();x.moveTo(45,y);x.lineTo(w-12,y);x.stroke();x.fillText(label(max*(1-i/4)),40,y+4)}}
function latency(){const c=$('#latency'),{x,w,h}=resize(c),s=REPORT.summary,max=Math.max(...s.map(v=>v.p95Ns),1);axes(x,w,h,max,fmtMs);const gw=(w-68)/s.length;s.forEach((a,i)=>{const bw=Math.min(28,gw*.25),cx=54+gw*i+gw/2;['medianNs','p95Ns'].forEach((k,j)=>{const bh=(h-72)*a[k]/max;x.fillStyle=j?COLORS[a.algorithm]+'88':COLORS[a.algorithm];x.fillRect(cx-bw+j*bw,h-36-bh,bw-2,bh)});x.fillStyle='#aab7ca';x.textAlign='center';x.fillText(a.algorithm,cx,h-15)})}
function work(){const c=$('#work'),{x,w,h}=resize(c),s=REPORT.summary,max=Math.max(...s.map(v=>v.medianRelaxed),1);axes(x,w,h,max,v=>Math.round(v).toLocaleString());const gw=(w-68)/s.length;s.forEach((a,i)=>{const bw=Math.min(50,gw*.58),bh=(h-72)*a.medianRelaxed/max,cx=54+gw*i+gw/2;x.fillStyle=COLORS[a.algorithm];x.fillRect(cx-bw/2,h-36-bh,bw,bh);x.fillStyle='#aab7ca';x.textAlign='center';x.fillText(a.algorithm,cx,h-15);x.fillText(fmtInt(a.medianRelaxed),cx,Math.max(14,h-42-bh))})}
function directions(){const c=$('#directions'),{x,w,h}=resize(c),share=REPORT.aegis.medianForwardShare||0,cx=w*.36,cy=h/2,r=Math.min(w,h)*.31,a=-Math.PI/2;[[share,'forward'],[1-share,'backward']].reduce((start,[v,k])=>{const z=2*Math.PI*v;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,start,start+z);x.closePath();x.fillStyle=COLORS[k];x.fill();return start+z},a);x.beginPath();x.arc(cx,cy,r*.58,0,Math.PI*2);x.fillStyle='#0a1019';x.fill();x.fillStyle='#eef4ff';x.textAlign='center';x.font='700 21px system-ui';x.fillText(pct(share),cx,cy+7);x.font='12px system-ui';[['forward',share],['backward',1-share]].forEach(([k,v],i)=>{const y=70+i*36;x.fillStyle=COLORS[k];x.fillRect(w*.67,y-10,12,12);x.fillStyle='#aab7ca';x.textAlign='left';x.fillText(`${k} ${pct(v)}`,w*.67+20,y)})}
function regret(){const c=$('#regret'),{x,w,h}=resize(c),vals=(REPORT.aegis.runtimeComparisons||[]).map(v=>v.relativeRuntime),bins=[1,1.05,1.1,1.25,1.5,2,Infinity],counts=new Array(bins.length).fill(0);vals.forEach(v=>{let i=bins.findIndex(b=>v<=b);counts[i<0?counts.length-1:i]++});const max=Math.max(...counts,1),gw=(w-48)/counts.length;counts.forEach((v,i)=>{const bh=(h-64)*v/max,px=28+i*gw;x.fillStyle=i<=2?'#75ddb0':i<=4?'#ffc56e':'#ff8c9a';x.fillRect(px,h-36-bh,gw*.72,bh);x.fillStyle='#aab7ca';x.textAlign='center';x.font='10px system-ui';const label=i===0?'≤1.00':i===bins.length-1?'>2.00':'≤'+bins[i].toFixed(2);x.fillText(label,px+gw*.36,h-15);x.fillText(v,px+gw*.36,Math.max(12,h-42-bh))})}
function directionClasses(){const c=$('#directionClasses'),{x,w,h}=resize(c),classes=['local','random','regional'],data=REPORT.aegis.directionByClass||{},max=Math.max(...classes.map(k=>{const d=data[k]||{};return (d.forwardExpanded||0)+(d.backwardExpanded||0)}),1),gw=(w-80)/3,bw=Math.min(120,gw*.52);classes.forEach((cl,i)=>{const d=data[cl]||{},f=d.forwardExpanded||0,b=d.backwardExpanded||0,cx=50+i*gw+gw/2;let y=h-40;[[b,'backward'],[f,'forward']].forEach(([v,k])=>{const bh=(h-78)*v/max;x.fillStyle=COLORS[k];x.fillRect(cx-bw/2,y-bh,bw,bh);y-=bh});x.fillStyle='#aab7ca';x.textAlign='center';x.fillText(cl,cx,h-17);x.fillText(fmtInt(f+b),cx,16)})}
function classes(){const c=$('#classes'),{x,w,h}=resize(c),classes=['local','random','regional'],algs=REPORT.summary.map(s=>s.algorithm),data=REPORT.classSummary||[],max=Math.max(...data.map(v=>v.medianNs),1);axes(x,w,h,max,fmtMs);const cg=(w-70)/3,bw=Math.min(22,cg/(algs.length+1));classes.forEach((cl,ci)=>{const cx=54+ci*cg+cg/2;algs.forEach((alg,ai)=>{const d=data.find(v=>v.class===cl&&v.algorithm===alg);if(!d)return;const bh=(h-76)*d.medianNs/max,px=cx-(algs.length*bw)/2+ai*bw;x.fillStyle=COLORS[alg];x.fillRect(px,h-39-bh,bw-3,bh)});x.fillStyle='#aab7ca';x.textAlign='center';x.fillText(cl,cx,h-16)})}
function render(){document.documentElement.lang=lang;document.querySelectorAll('[data-t]').forEach(e=>e.textContent=T[e.dataset.t]||e.dataset.t);$('#subtitle').textContent=`${REPORT.graphName} · ${REPORT.profile}/${REPORT.metric} · Aegis ACBS v${REPORT.version}`;const meta=[[T.generated,new Date(REPORT.generatedAt).toLocaleString()],[T.graph,REPORT.graphName],[T.nodes,fmtInt(REPORT.nodes)],[T.edges,fmtInt(REPORT.edges)],[T.queries,fmtInt(REPORT.config.queries)],[T.repeats,fmtInt(REPORT.config.repeats)+' × '+fmtInt(REPORT.config.batchSize)+' · '+(REPORT.config.order||'rotated')]];$('#meta').innerHTML=meta.map(([a,b])=>`<div class="card"><div class="label">${a}</div><div class="value">${b}</div></div>`).join('');const a=REPORT.aegis||{},k=[[T.correctness,REPORT.allCorrect?T.allCorrect:'Mismatch',REPORT.allCorrect?'good':'bad'],[T.speedup,(a.ratioOfMediansVsDijkstra||0).toFixed(2)+'×',(a.ratioOfMediansVsDijkstra||0)>=1?'good':'warn'],[T.runtimeRegret,(a.p95OracleRegret||0).toFixed(2)+'×',(a.p95OracleRegret||0)<=1.25?'good':'warn'],[T.bound,(a.medianTerminationTightness||0).toFixed(4),(a.medianTerminationTightness||0)>=.999?'good':'warn'],[T.switches,fmtInt(a.medianDirectionSwitches||0),'good'],[T.pruned,fmtInt(a.medianBoundPruned||0),(a.medianBoundPruned||0)>0?'good':'warn'],['Peak RSS',fmtBytes(REPORT.memory?.peakRssBytes||0),'good']];$('#kpis').innerHTML=k.map(([l,v,c])=>`<div class="card ${c}"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('');$('#rows').innerHTML=REPORT.summary.map(s=>`<tr><td><span class="pill"><span class="dot" style="background:${COLORS[s.algorithm]}"></span>${s.algorithm}</span></td><td>${fmtMs(s.meanNs)}</td><td>${fmtMs(s.medianNs)}</td><td>${fmtMs(s.minNs)}</td><td>${fmtMs(s.maxNs)}</td><td>${fmtMs(s.p95Ns)}</td><td>${fmtMs(s.p99Ns)}</td><td>${fmtInt(s.medianExpanded)}</td><td>${fmtInt(s.medianRelaxed)}</td><td>${fmtInt(s.medianQueuePushes)}</td><td>${fmtInt(s.medianQueuePops)}</td><td>${fmtInt(s.medianStalePops)}</td><td>${fmtInt(s.medianPrunedAtPop)}</td><td>${fmtInt(s.medianPrunedAtRelax)}</td><td>${fmtBytes(s.medianAllocBytes)}</td><td>${(s.ratioOfMediansVsDijkstra||0).toFixed(2)}×</td><td>${s.correct}/${s.runs}</td></tr>`).join('');$('#footer').textContent=`${T.source}: ${REPORT.graphSource||'—'} · ${REPORT.goVersion} ${REPORT.goos}/${REPORT.goarch} · seed ${REPORT.config.seed} · peak RSS ${fmtBytes(REPORT.memory?.peakRssBytes||0)} · connections ${fmtInt(REPORT.aegis?.medianConnectionChecks||0)} / finite ${fmtInt(REPORT.aegis?.medianFiniteMeetings||0)} / updates ${fmtInt(REPORT.aegis?.medianUpperBoundUpdates||0)}`;latency();work();directions();regret();directionClasses();classes()}
$('#lang').addEventListener('change',e=>{lang=e.target.value;T=I[lang]||I.en;render()});addEventListener('resize',()=>{clearTimeout(window.__r);window.__r=setTimeout(render,120)});render();
</script></body></html>
