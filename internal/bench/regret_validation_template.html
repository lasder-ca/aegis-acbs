<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>ACBS Regret Validation</title><style>:root{color-scheme:dark;background:#0b1018;color:#e8edf5;font:14px system-ui,sans-serif}body{margin:0}main{max-width:1220px;margin:auto;padding:32px}.eyebrow{color:#7f91aa;text-transform:uppercase;letter-spacing:.15em;font-size:12px}h1{font-size:34px;margin:8px 0}.sub{color:#aab6c8;margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card{background:#111a27;border:1px solid #243147;border-radius:12px;padding:16px}.label{color:#91a0b5;font-size:12px}.value{font-size:25px;font-weight:700;margin-top:5px}.pass{color:#75ddb0}.fail{color:#ff8c9a}.table{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid #273349;white-space:nowrap}th{color:#aebbd0}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}@media(max-width:850px){.two{grid-template-columns:1fr}}.footer{color:#8390a3;margin-top:20px}</style></head><body><main><div class="eyebrow">Aegis ACBS · large-sample validation</div><h1>Regret Validation Matrix</h1><div class="sub" id="subtitle"></div><section class="grid" id="kpis"></section><section class="two"><div class="card"><h2>Runs</h2><div class="table"><table><thead><tr><th>Path</th><th>Metric</th><th>Seed</th><th>Queries</th><th>Meaningful</th><th>p95 ratio</th><th>Max penalty</th><th>Correct</th></tr></thead><tbody id="runs"></tbody></table></div></div><div class="card"><h2>Groups</h2><div class="table"><table><thead><tr><th>Group</th><th>Queries</th><th>Meaningful</th><th>Rate</th><th>p95 ratio</th><th>Max penalty</th></tr></thead><tbody id="groups"></tbody></table></div></div></section><section class="card" style="margin-top:14px"><h2>Meaningful slowdowns</h2><div class="table"><table><thead><tr><th>Run</th><th>Query</th><th>Class</th><th>Baseline</th><th>Ratio</th><th>Penalty</th><th>Distance</th><th>Expanded</th></tr></thead><tbody id="top"></tbody></table></div></section><div class="footer" id="footer"></div></main><script>const R=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob('__AEGIS_REGRET_VALIDATION_BASE64__'),c=>c.charCodeAt(0))));const pct=x=>(100*x).toFixed(x<.001?4:3)+'%';const ms=n=>(n/1e6).toFixed(3)+' ms';document.getElementById('subtitle').textContent=`${R.files} runs · threshold ${R.config.ratioThreshold.toFixed(2)}× and ${ms(R.config.penaltyFloorNs)} · generated ${R.generatedAt}`;const cards=[['Status',R.passed?'PASS':'FAIL'],['Queries',R.totalQueries.toLocaleString()],['Meaningful',R.totalMeaningful],['Observed rate',pct(R.meaningfulRate)],['95% upper',pct(R.meaningfulRateWilsonHigh95)],['Zero-event upper',R.totalMeaningful===0?pct(R.zeroEventUpper95):'—'],['Penalty p95',ms(R.p95PenaltyNs)],['Max penalty',ms(R.maxPenaltyNs)]];document.getElementById('kpis').innerHTML=cards.map((x,i)=>`<div class="card"><div class="label">${x[0]}</div><div class="value ${i===0?(R.passed?'pass':'fail'):''}">${x[1]}</div></div>`).join('');document.getElementById('runs').innerHTML=R.runs.map(x=>`<tr><td>${x.path}</td><td>${x.metric}</td><td>${x.seed}</td><td>${x.queries}</td><td>${x.meaningful}</td><td>${x.p95RuntimeRatio.toFixed(3)}×</td><td>${ms(x.maxPenaltyNs)}</td><td>${x.allCorrect}</td></tr>`).join('');const groups=[...R.byMetric,...R.byClass,...R.byBaseline];document.getElementById('groups').innerHTML=groups.map(x=>`<tr><td>${x.name}</td><td>${x.queries}</td><td>${x.meaningful}</td><td>${pct(x.meaningfulRate)}</td><td>${x.p95RuntimeRatio.toFixed(3)}×</td><td>${ms(x.maxPenaltyNs)}</td></tr>`).join('');document.getElementById('top').innerHTML=R.topMeaningful.length?R.topMeaningful.map(x=>`<tr><td>${x.path}</td><td>${x.queryIndex}</td><td>${x.class}</td><td>${x.fastestClassical}</td><td>${x.runtimeRatio.toFixed(3)}×</td><td>${ms(x.absolutePenaltyNs)}</td><td>${(x.straightLineMeters/1000).toFixed(2)} km</td><td>${x.expanded}</td></tr>`).join(''):'<tr><td colspan="8" class="pass">No meaningful slowdowns found.</td></tr>';document.getElementById('footer').textContent=`${R.version} · all correct: ${R.allCorrect} · enough queries: ${R.enoughQueries}`;</script></body></html>
