<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ACBS Regret Diagnosis</title><style>
:root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;--bg:#070a10;--panel:#111824;--line:#273349;--text:#eef4ff;--muted:#95a4ba;--good:#75ddb0;--warn:#ffc56e;--bad:#ff8c9a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% -8%,#1a2d55 0,transparent 34%),var(--bg);color:var(--text)}main{max-width:1500px;margin:auto;padding:32px 18px 64px}h1{font-size:clamp(38px,7vw,72px);line-height:.95;letter-spacing:-.055em;margin:8px 0}.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#c6a2ff;font-weight:800}.sub{color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-bottom:18px}.card{background:linear-gradient(180deg,rgba(18,27,42,.96),rgba(9,15,24,.96));border:1px solid var(--line);border-radius:18px;padding:16px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.value{font-size:23px;font-weight:780;margin-top:5px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.chart{width:100%;height:330px;border:1px solid var(--line);border-radius:14px;background:#080d15}.table{overflow:auto;border:1px solid var(--line);border-radius:16px;margin-top:12px}table{border-collapse:collapse;width:100%;min-width:1250px}th,td{padding:10px 11px;border-bottom:1px solid #1d2839;text-align:right;font-size:12px;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{position:sticky;top:0;background:#0b111a;color:var(--muted);font-size:10px;text-transform:uppercase}.bad{color:var(--bad);font-weight:700}.good{color:var(--good);font-weight:700}h2{font-size:18px;margin:0 0 10px}.footer{color:#728198;font-size:12px;margin-top:16px}@media(max-width:950px){.grid{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}}
</style></head><body><main><div class="eyebrow">Aegis ACBS · tail diagnosis</div><h1>Regret Diagnosis</h1><div class="sub" id="subtitle"></div><section class="grid" id="kpis"></section><section class="two"><div class="card"><h2>Ratio × absolute penalty</h2><canvas class="chart" id="scatter"></canvas></div><div class="card"><h2>Penalty correlation</h2><div class="table"><table><thead><tr><th>Feature</th><th>Pearson r</th></tr></thead><tbody id="corr"></tbody></table></div></div></section><section class="card" style="margin-top:16px"><h2>Largest meaningful slowdowns</h2><div class="table"><table><thead><tr><th>Query</th><th>Class</th><th>Baseline</th><th>ACBS ms</th><th>Baseline ms</th><th>Ratio</th><th>Penalty ms</th><th>Distance km</th><th>Expanded</th><th>Forward share</th><th>Switches</th><th>Chunks</th><th>First UB</th><th>Stale rate</th></tr></thead><tbody id="rows"></tbody></table></div></section><div class="footer" id="footer"></div></main><script>
const R=JSON.parse(atob('__AEGIS_REGRET_BASE64__'));const ms=n=>(n/1e6).toFixed(3);document.getElementById('subtitle').textContent=`${R.graphName} · ${R.metric} · ${R.config.algorithm} · ratio ≥ ${R.config.ratioThreshold} and penalty ≥ ${ms(R.config.penaltyFloorNs)} ms`;
const cards=[['Queries',R.queries],['Meaningful',R.meaningfulQueries],['Ratio p50',R.p50RuntimeRatio.toFixed(3)+'×'],['Ratio p95',R.p95RuntimeRatio.toFixed(3)+'×'],['Penalty p95',ms(R.p95PenaltyNs)+' ms'],['Max penalty',ms(R.maxPenaltyNs)+' ms']];document.getElementById('kpis').innerHTML=cards.map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');
const corr=Object.entries(R.correlations).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));document.getElementById('corr').innerHTML=corr.map(([k,v])=>`<tr><td>${k}</td><td class="${Math.abs(v)>=.35?'bad':''}">${v.toFixed(3)}</td></tr>`).join('');
const rows=R.topByPenalty.filter(x=>x.meaningful);document.getElementById('rows').innerHTML=rows.map(x=>`<tr><td>${x.queryIndex}</td><td>${x.class}</td><td>${x.fastestClassical}</td><td>${ms(x.algorithmNs)}</td><td>${ms(x.fastestClassicalNs)}</td><td class="bad">${x.runtimeRatio.toFixed(3)}×</td><td class="bad">${ms(x.absolutePenaltyNs)}</td><td>${(x.straightLineMeters/1000).toFixed(2)}</td><td>${x.expanded}</td><td>${(100*x.forwardShare).toFixed(1)}%</td><td>${x.directionSwitches}</td><td>${x.chunks}</td><td>${(100*x.firstUpperBoundFraction).toFixed(1)}%</td><td>${(100*x.staleRate).toFixed(1)}%</td></tr>`).join('');
const c=document.getElementById('scatter'),ctx=c.getContext('2d');function draw(){const dpr=devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*dpr;c.height=h*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);ctx.strokeStyle='#273349';ctx.fillStyle='#95a4ba';ctx.font='11px system-ui';const p={l:50,r:18,t:18,b:38};const xs=R.rows.map(x=>x.runtimeRatio),ys=R.rows.map(x=>x.absolutePenaltyNs/1e6);const xmax=Math.max(1.05,...xs),ymax=Math.max(.01,...ys);for(let i=0;i<=5;i++){const x=p.l+(w-p.l-p.r)*i/5,y=p.t+(h-p.t-p.b)*i/5;ctx.beginPath();ctx.moveTo(x,p.t);ctx.lineTo(x,h-p.b);ctx.stroke();ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.fillText((xmax*i/5).toFixed(1)+'×',x-10,h-12);ctx.fillText((ymax*(5-i)/5).toFixed(1),5,y+4)}for(const q of R.rows){const x=p.l+(w-p.l-p.r)*q.runtimeRatio/xmax,y=h-p.b-(h-p.t-p.b)*(q.absolutePenaltyNs/1e6)/ymax;ctx.fillStyle=q.meaningful?'#ff8c9a':'#75ddb0';ctx.beginPath();ctx.arc(x,y,q.meaningful?3.5:2.2,0,Math.PI*2);ctx.fill()}}addEventListener('resize',draw);draw();document.getElementById('footer').textContent=`Source ${R.sourceVersion} · ${R.version}`;
</script></body></html>
