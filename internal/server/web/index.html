<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aegis ACBS</title>
<style>
:root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color-scheme:dark;--bg:#070a10;--panel:#101722;--panel2:#0a1019;--line:#243044;--text:#eef3fb;--muted:#91a0b7;--blue:#8eb6ff;--green:#75ddb0;--amber:#ffc56e;--red:#ff8c9a;--purple:#c6a2ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% -5%,#1a2745 0,transparent 34%),radial-gradient(circle at 92% 8%,#17302e 0,transparent 28%),var(--bg);color:var(--text);min-height:100vh}.shell{max-width:1360px;margin:auto;padding:30px 20px 60px}header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}.eyebrow{text-transform:uppercase;letter-spacing:.14em;color:var(--blue);font-weight:800;font-size:11px}h1{font-size:clamp(36px,6vw,70px);line-height:.95;letter-spacing:-.065em;margin:8px 0 12px}.tag{color:var(--muted);max-width:720px}.lang{background:#111927;border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:inherit}.grid{display:grid;gap:16px}.meta{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:16px}.main-grid{grid-template-columns:minmax(0,.9fr) minmax(0,1.25fr)}.card{background:linear-gradient(180deg,rgba(18,26,39,.95),rgba(10,16,25,.95));border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 22px 70px rgba(0,0,0,.22)}.meta-card{padding:14px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}.value{font-size:23px;font-weight:780;letter-spacing:-.035em;margin-top:5px}.meta-card .value{font-size:17px}h2{font-size:19px;margin:0 0 4px}h3{font-size:14px;margin:0 0 10px;color:#cbd5e4}.hint{font-size:12px;color:var(--muted);margin:0 0 14px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}form{display:grid;gap:12px}label{display:grid;gap:6px;color:#afbbcd;font-size:12px}input,select,button{font:inherit;border-radius:11px;border:1px solid #2b3950;background:#090f18;color:var(--text);padding:11px 12px;min-width:0}button{border:0;background:var(--text);color:#07101b;font-weight:800;cursor:pointer}button:hover{filter:brightness(.92)}button:disabled{opacity:.55;cursor:wait}.chart{display:block;width:100%;height:300px;border-radius:14px;background:linear-gradient(180deg,#090e16,#080c13);border:1px solid #1d283a}.chart.short{height:230px}.route-layout{display:grid;gap:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.stat{padding:11px;background:#0a1019;border:1px solid #1f2a3c;border-radius:13px}.stat b{display:block;font-size:17px;margin-top:4px}.decision{display:none;padding:13px;border-radius:14px;background:linear-gradient(135deg,rgba(198,162,255,.12),rgba(142,182,255,.07));border:1px solid rgba(198,162,255,.35)}.decision.show{display:block}.decision-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill{display:inline-flex;align-items:center;gap:7px;padding:5px 9px;border-radius:999px;background:#182235;border:1px solid #293750;font-size:12px}.dot{width:8px;height:8px;border-radius:50%}.decision-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.bench-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}.kpi{padding:12px;border-radius:14px;background:#0a1019;border:1px solid #223047}.kpi.good{border-color:rgba(117,221,176,.4)}.kpi.warn{border-color:rgba(255,197,110,.4)}.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chart-card{padding:12px;background:#0a1019;border:1px solid #1f2a3c;border-radius:15px}.chart-card h3{margin-bottom:4px}.chart-card .hint{margin-bottom:8px}.table-wrap{overflow:auto;margin-top:12px;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:690px}th,td{text-align:right;padding:10px 12px;border-bottom:1px solid #1c2738;font-size:12px}th:first-child,td:first-child{text-align:left}th{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:#0b111a}tr:last-child td{border-bottom:0}.status{min-height:22px;color:var(--muted);font-size:12px;margin-top:9px}.ok{color:var(--green)}.bad{color:var(--red)}footer{margin-top:18px;color:#718099;font-size:12px}@media(max-width:1100px){.meta{grid-template-columns:repeat(3,1fr)}.main-grid{grid-template-columns:1fr}.charts{grid-template-columns:1fr 1fr}}@media(max-width:760px){header{flex-direction:column}.meta{grid-template-columns:repeat(2,1fr)}.form-grid,.bench-form,.charts{grid-template-columns:1fr}.stats,.kpis{grid-template-columns:repeat(2,1fr)}.decision-grid{grid-template-columns:1fr}.shell{padding:24px 13px 50px}.card{border-radius:16px}}
</style>
</head>
<body><main class="shell">
<header><div><div class="eyebrow">Aegis ACBS · experimental</div><h1 data-i18n="dashboard"></h1><div class="tag" data-i18n="app.tagline"></div></div><select id="lang" class="lang" aria-label="Language"><option value="ja">日本語</option><option value="en">English</option><option value="zh-CN">中文</option><option value="ko">한국어</option><option value="fr">Français</option></select></header>
<section id="meta" class="grid meta"></section>
<section class="grid main-grid">
<div class="card route-layout"><div><h2 data-i18n="routeSearch"></h2><p class="hint" data-i18n="source_help"></p></div>
<form id="routeForm"><div class="form-grid"><label><span data-i18n="source"></span><input id="source" required placeholder="51.7648,-0.2353"></label><label><span data-i18n="target"></span><input id="target" required placeholder="51.7668,-0.2285"></label></div><label><span data-i18n="algorithm"></span><select id="algorithm"><option value="aegis">Aegis ACBS</option><option value="astar">A*</option><option value="bidijkstra">Bidirectional Dijkstra</option><option value="dijkstra">Dijkstra</option><option value="aegis-race">Aegis Race (2 cores)</option></select></label><button type="submit" data-i18n="route"></button></form>
<canvas id="routeCanvas" class="chart"></canvas><div id="routeStats" class="stats"></div><div id="decision" class="decision"><div class="decision-head"><div><div class="label" data-i18n="decision"></div><strong id="decisionTitle"></strong></div><span id="decisionPill" class="pill"></span></div><div id="decisionGrid" class="decision-grid"></div></div><div id="routeStatus" class="status"></div></div>
<div class="card"><div><h2 data-i18n="benchmarkLab"></h2><p class="hint">p50 / p95 / p99 · relative runtime · coupled bounds · local / random / regional</p></div><form id="benchForm" class="bench-form"><label><span data-i18n="queries"></span><input id="queries" type="number" min="3" max="1000" value="60"></label><label><span data-i18n="repeats"></span><input id="repeats" type="number" min="1" max="31" step="2" value="7"></label><button type="submit" data-i18n="run"></button></form><div id="kpis" class="kpis"></div><div class="charts"><div class="chart-card"><h3 data-i18n="latency"></h3><p class="hint">p50 / p95</p><canvas id="latencyCanvas" class="chart short"></canvas></div><div class="chart-card"><h3 data-i18n="searchWork"></h3><p class="hint" data-i18n="relaxed"></p><canvas id="workCanvas" class="chart short"></canvas></div><div class="chart-card"><h3 data-i18n="selection"></h3><p class="hint">ACBS forward / backward</p><canvas id="selectionCanvas" class="chart short"></canvas></div><div class="chart-card"><h3 data-i18n="regret"></h3><p class="hint">1.0 = fastest classical baseline</p><canvas id="regretCanvas" class="chart short"></canvas></div></div><div class="table-wrap"><table><thead><tr><th data-i18n="algorithm"></th><th>p50</th><th>p95</th><th>p99</th><th data-i18n="expanded"></th><th data-i18n="relaxed"></th><th>push</th><th>pop</th><th>stale</th><th>prune pop</th><th>prune relax</th><th data-i18n="speedup"></th><th data-i18n="correct"></th></tr></thead><tbody id="summaryRows"></tbody></table></div><div id="benchStatus" class="status"></div></div>
</section><footer><span data-i18n="attribution"></span> · Aegis One v<span id="version"></span></footer></main>
<script>
let T={},META=null,LAST=null;const $=s=>document.querySelector(s);const COLORS={dijkstra:'#8eb6ff',bidijkstra:'#75ddb0',astar:'#ffc56e',aegis:'#c6a2ff','aegis-static':'#ff9fd2','aegis-prune':'#9de0ff','aegis-no-prune':'#9de0ff','aegis-projection':'#b8f28d','aegis-race':'#ff8c9a'};const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function setLang(lang){const r=await fetch('/api/i18n/'+encodeURIComponent(lang));T=await r.json();document.documentElement.lang=lang;document.querySelectorAll('[data-i18n]').forEach(e=>{e.textContent=T[e.dataset.i18n]||e.dataset.i18n});localStorage.setItem('aegis-lang',lang);if(META)renderMeta();if(LAST)renderBenchmark(LAST)}
const fmtInt=n=>Number(n||0).toLocaleString();const fmtTime=n=>n<1e6?(n/1e3).toFixed(2)+' µs':(n/1e6).toFixed(3)+' ms';const pct=n=>(100*(n||0)).toFixed(1)+'%';
function fmtCost(v){if(!META)return v;if(META.metric==='distance')return (v/1000).toFixed(1)+' m';return (v/1000).toFixed(2)+' s'}
function canvas(c){const d=devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*d;c.height=h*d;const x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);x.clearRect(0,0,w,h);return{x,w,h}}
function axes(x,w,h,max,label){x.strokeStyle='#263247';x.fillStyle='#8f9db3';x.font='10px system-ui';x.textAlign='right';for(let i=0;i<=3;i++){let y=18+(h-50)*i/3;x.beginPath();x.moveTo(40,y);x.lineTo(w-10,y);x.stroke();x.fillText(label(max*(1-i/3)),36,y+3)}}
function renderMeta(){const items=[[T.graph,META.name],[T.nodes,fmtInt(META.nodes)],[T.edges,fmtInt(META.edges)],[T.profile,META.profile],[T.heuristicStrength,(META.heuristicStrength||0).toFixed(2)],[T.metric,META.metric]];$('#meta').innerHTML=items.map(([k,v])=>`<div class="card meta-card"><div class="label">${esc(k)}</div><div class="value">${esc(v)}</div></div>`).join('')}
function drawRoute(coords){const c=$('#routeCanvas'),{x,w,h}=canvas(c);x.strokeStyle='#182338';x.lineWidth=1;for(let i=1;i<6;i++){x.beginPath();x.moveTo(w*i/6,0);x.lineTo(w*i/6,h);x.stroke();x.beginPath();x.moveTo(0,h*i/6);x.lineTo(w,h*i/6);x.stroke()}if(!coords||coords.length<2)return;const lats=coords.map(p=>p[0]),lons=coords.map(p=>p[1]),minA=Math.min(...lats),maxA=Math.max(...lats),minO=Math.min(...lons),maxO=Math.max(...lons),pad=28,dx=Math.max(1e-9,maxO-minO),dy=Math.max(1e-9,maxA-minA),project=p=>[pad+(p[1]-minO)/dx*(w-pad*2),h-pad-(p[0]-minA)/dy*(h-pad*2)];x.strokeStyle='#8eb6ff';x.lineWidth=4;x.lineJoin='round';x.lineCap='round';x.beginPath();coords.forEach((p,i)=>{const [px,py]=project(p);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();[['S',coords[0],'#75ddb0'],['T',coords.at(-1),'#ff8c9a']].forEach(([label,p,color])=>{const [px,py]=project(p);x.fillStyle=color;x.beginPath();x.arc(px,py,8,0,Math.PI*2);x.fill();x.fillStyle='#07101b';x.textAlign='center';x.font='800 10px system-ui';x.fillText(label,px,py+3)})}
function renderRoute(j){drawRoute(j.coordinates);const s=j.stats,items=[[T.distance,fmtCost(s.distance)],[T.time,fmtTime(s.durationNs)],[T.expanded,fmtInt(s.expanded)],[T.relaxed,fmtInt(s.relaxed)]];$('#routeStats').innerHTML=items.map(([k,v])=>`<div class="stat"><div class="label">${esc(k)}</div><b>${esc(v)}</b></div>`).join('');if(s.algorithm==='aegis'){$('#decision').classList.add('show');$('#decisionTitle').textContent='Aegis Coupled-Bound Search';$('#decisionPill').innerHTML=`<span class="dot" style="background:${COLORS.aegis}"></span>ACBS`;$('#decisionGrid').innerHTML=[[T.forward||'Forward',fmtInt(s.forwardExpanded)],[T.backward||'Backward',fmtInt(s.backwardExpanded)],[(T.switches||'Switches')+' / chunks',fmtInt(s.directionSwitches)+' / '+fmtInt(s.chunks)],['Bound pruned',fmtInt(s.boundPruned||0)],['Optimality gap',fmtInt(s.optimalityGap||0)]].map(([k,v])=>`<div class="stat"><div class="label">${esc(k)}</div><b>${v}</b></div>`).join('')}else{$('#decision').classList.remove('show')}$('#routeStatus').innerHTML=`<span class="ok">${esc(s.algorithm)}</span> · ${fmtInt(s.pathNodes)} nodes`}
function reasonText(k){return T['reason.'+k]||String(k).replaceAll('_',' ')}
function drawLatency(summary){const c=$('#latencyCanvas'),{x,w,h}=canvas(c),max=Math.max(...summary.map(s=>s.p95Ns),1);axes(x,w,h,max,fmtTime);const gw=(w-54)/summary.length;summary.forEach((s,i)=>{const bw=Math.min(22,gw*.28),cx=44+i*gw+gw/2;[['medianNs',1],['p95Ns',.45]].forEach(([key,alpha],j)=>{const bh=(h-66)*s[key]/max;x.globalAlpha=alpha;x.fillStyle=COLORS[s.algorithm];x.fillRect(cx-bw+j*bw,h-31-bh,bw-2,bh);x.globalAlpha=1});x.fillStyle='#aab7ca';x.textAlign='center';x.font='9px system-ui';x.fillText(s.algorithm,cx,h-12)})}
function drawWork(summary){const c=$('#workCanvas'),{x,w,h}=canvas(c),max=Math.max(...summary.map(s=>s.medianRelaxed),1),gw=(w-48)/summary.length;summary.forEach((s,i)=>{const bw=Math.min(44,gw*.58),bh=(h-58)*s.medianRelaxed/max,cx=38+i*gw+gw/2;x.fillStyle=COLORS[s.algorithm];x.fillRect(cx-bw/2,h-29-bh,bw,bh);x.fillStyle='#aab7ca';x.textAlign='center';x.font='9px system-ui';x.fillText(s.algorithm,cx,h-11);x.fillText(fmtInt(s.medianRelaxed),cx,Math.max(12,h-34-bh))})}
function drawSelection(a){const c=$('#selectionCanvas'),{x,w,h}=canvas(c),f=a.medianForwardShare||0,b=1-f,total=100,cx=w*.34,cy=h/2,r=Math.min(w,h)*.31;let z=-Math.PI/2;[[f,'#8eb6ff'],[b,'#ff8c9a']].forEach(([v,color])=>{const arc=2*Math.PI*v;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,z,z+arc);x.closePath();x.fillStyle=color;x.fill();z+=arc});x.beginPath();x.arc(cx,cy,r*.58,0,Math.PI*2);x.fillStyle='#0a1019';x.fill();x.fillStyle='#eef3fb';x.font='800 18px system-ui';x.textAlign='center';x.fillText(pct(f),cx,cy+6);[['Forward',f,'#8eb6ff'],['Backward',b,'#ff8c9a']].forEach(([k,v,color],i)=>{const y=55+i*32;x.fillStyle=color;x.fillRect(w*.62,y-8,10,10);x.fillStyle='#aab7ca';x.textAlign='left';x.font='10px system-ui';x.fillText(`${k} ${pct(v)}`,w*.62+15,y)})}
function drawRegret(a){const c=$('#regretCanvas'),{x,w,h}=canvas(c),vals=(a.runtimeComparisons||[]).map(r=>(r.runtimeVsFastestClassical??r.relativeRuntime)),bins=[1,1.05,1.1,1.2,1.5,2,Infinity],counts=new Array(bins.length).fill(0);vals.forEach(v=>{let i=bins.findIndex(b=>v<=b);counts[i<0?counts.length-1:i]++});const max=Math.max(...counts,1),gw=(w-34)/counts.length;counts.forEach((v,i)=>{const bh=(h-55)*v/max,px=22+i*gw;x.fillStyle=i<=2?'#75ddb0':i<=4?'#ffc56e':'#ff8c9a';x.fillRect(px,h-28-bh,gw*.7,bh);x.fillStyle='#aab7ca';x.textAlign='center';x.font='8px system-ui';x.fillText(i===0?'≤1':i===bins.length-1?'>2':'≤'+bins[i],px+gw*.35,h-10);x.fillText(v,px+gw*.35,Math.max(10,h-32-bh))})}
function renderBenchmark(j){LAST=j;const a=j.aegis||{},k=[[T.correct,j.allCorrect?(T.allCorrect||'All matched'):'Mismatch',j.allCorrect?'good':'bad'],[T.speedup,(a.ratioOfMediansVsDijkstra||0).toFixed(2)+'×',(a.ratioOfMediansVsDijkstra||0)>=1?'good':'warn'],['p95 oracle regret',((a.p95ClassicalOracleRegret??a.p95OracleRegret)||0).toFixed(2)+'×',((a.p95ClassicalOracleRegret??a.p95OracleRegret)||0)<=1.5?'good':'warn'],[T.bound||'Bound',(a.medianTerminationTightness||0).toFixed(4),(a.medianTerminationTightness||0)>=.999?'good':'warn']];$('#kpis').innerHTML=k.map(([l,v,c])=>`<div class="kpi ${c}"><div class="label">${esc(l)}</div><div class="value">${esc(v)}</div></div>`).join('');drawLatency(j.summary);drawWork(j.summary);drawSelection(a);drawRegret(a);$('#summaryRows').innerHTML=j.summary.map(s=>`<tr><td><span class="pill"><span class="dot" style="background:${COLORS[s.algorithm]}"></span>${s.algorithm}</span></td><td>${fmtTime(s.medianNs)}</td><td>${fmtTime(s.p95Ns)}</td><td>${fmtTime(s.p99Ns)}</td><td>${fmtInt(s.medianExpanded)}</td><td>${fmtInt(s.medianRelaxed)}</td><td>${fmtInt(s.medianQueuePushes)}</td><td>${fmtInt(s.medianQueuePops)}</td><td>${fmtInt(s.medianStalePops)}</td><td>${fmtInt(s.medianPrunedAtPop)}</td><td>${fmtInt(s.medianPrunedAtRelax)}</td><td>${(s.ratioOfMediansVsDijkstra||0).toFixed(2)}×</td><td>${s.correct}/${s.runs}</td></tr>`).join('');$('#benchStatus').innerHTML=`<span class="${j.allCorrect?'ok':'bad'}">${j.allCorrect?(T.allCorrect||'All matched'):'Mismatch'}</span> · ${fmtInt(j.config.queries)} queries × ${fmtInt(j.config.repeats)} × ${fmtInt(j.config.batchSize)}`}
async function load(){META=await (await fetch('/api/meta')).json();$('#version').textContent=META.version;renderMeta();$('#source').value=String(META.suggestedSourceId);$('#target').value=String(META.suggestedTargetId);drawRoute([])}
$('#lang').addEventListener('change',async e=>{await setLang(e.target.value)});
$('#routeForm').addEventListener('submit',async e=>{e.preventDefault();const b=e.submitter;b.disabled=true;$('#routeStatus').textContent=T.loading||'Working…';try{const r=await fetch('/api/route',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({source:$('#source').value,target:$('#target').value,algorithm:$('#algorithm').value})}),j=await r.json();if(!r.ok)throw Error(j.error);renderRoute(j)}catch(err){$('#routeStatus').innerHTML=`<span class="bad">${esc(T.error||'Error')}: ${esc(err.message)}</span>`}finally{b.disabled=false}});
$('#benchForm').addEventListener('submit',async e=>{e.preventDefault();const b=e.submitter;b.disabled=true;$('#benchStatus').textContent=T.loading||'Working…';try{const r=await fetch('/api/benchmark',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({queries:+$('#queries').value,repeats:+$('#repeats').value,seed:1010,algorithms:['dijkstra','bidijkstra','astar','aegis']})}),j=await r.json();if(!r.ok)throw Error(j.error);renderBenchmark(j)}catch(err){$('#benchStatus').innerHTML=`<span class="bad">${esc(T.error||'Error')}: ${esc(err.message)}</span>`}finally{b.disabled=false}});
addEventListener('resize',()=>{clearTimeout(window.__resize);window.__resize=setTimeout(()=>{if(LAST)renderBenchmark(LAST)},120)});
(async()=>{let lang=localStorage.getItem('aegis-lang')||navigator.language||'ja';if(!['ja','en','zh-CN','ko','fr'].includes(lang))lang=lang.startsWith('zh')?'zh-CN':lang.slice(0,2);if(!['ja','en','zh-CN','ko','fr'].includes(lang))lang='en';$('#lang').value=lang;await setLang(lang);await load()})();
</script></body></html>
